<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <!-- Background -->
  <rect width="640" height="360" fill="#F8F9FA"/>

  <!-- MOSFET transistor symbol -->
  <!-- Gate -->
  <line x1="220" y1="180" x2="260" y2="180" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="270" y1="140" x2="270" y2="220" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Channel -->
  <line x1="280" y1="145" x2="280" y2="165" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="280" y1="175" x2="280" y2="185" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="280" y1="195" x2="280" y2="215" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Drain -->
  <line x1="280" y1="150" x2="320" y2="150" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="320" y1="100" x2="320" y2="150" stroke="#1A1A2E" stroke-width="2"/>
  <!-- Source -->
  <line x1="280" y1="210" x2="320" y2="210" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="320" y1="210" x2="320" y2="260" stroke="#1A1A2E" stroke-width="2"/>

  <!-- Inductor (source degeneration) - coil shape -->
  <path d="M320,260 Q330,250 320,240 Q310,230 320,220 Q330,210 320,200" fill="none" stroke="#6C63FF" stroke-width="2" transform="translate(0,50)"/>

  <!-- VDD line -->
  <line x1="280" y1="100" x2="360" y2="100" stroke="#1A1A2E" stroke-width="2"/>
  <text x="370" y="104" font-family="sans-serif" font-size="11" fill="#1A1A2E">V_DD</text>

  <!-- Load inductor (drain) -->
  <path d="M320,100 Q330,110 320,120 Q310,130 320,140 Q330,150 320,160" fill="none" stroke="#6C63FF" stroke-width="2" transform="translate(0,-60)"/>

  <!-- Capacitor at input -->
  <line x1="180" y1="175" x2="180" y2="185" stroke="#6C63FF" stroke-width="2"/>
  <line x1="170" y1="175" x2="190" y2="175" stroke="#6C63FF" stroke-width="2"/>
  <line x1="170" y1="185" x2="190" y2="185" stroke="#6C63FF" stroke-width="2"/>
  <line x1="150" y1="180" x2="170" y2="180" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="190" y1="180" x2="220" y2="180" stroke="#1A1A2E" stroke-width="2"/>

  <!-- Output capacitor -->
  <line x1="380" y1="145" x2="380" y2="155" stroke="#6C63FF" stroke-width="2"/>
  <line x1="370" y1="145" x2="390" y2="145" stroke="#6C63FF" stroke-width="2"/>
  <line x1="370" y1="155" x2="390" y2="155" stroke="#6C63FF" stroke-width="2"/>
  <line x1="320" y1="150" x2="370" y2="150" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="390" y1="150" x2="430" y2="150" stroke="#1A1A2E" stroke-width="2"/>

  <!-- Ground symbol -->
  <line x1="310" y1="310" x2="330" y2="310" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="314" y1="316" x2="326" y2="316" stroke="#1A1A2E" stroke-width="1.5"/>
  <line x1="318" y1="322" x2="322" y2="322" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Labels -->
  <text x="140" y="196" font-family="sans-serif" font-size="10" fill="#1A1A2E">IN</text>
  <text x="435" y="154" font-family="sans-serif" font-size="10" fill="#1A1A2E">OUT</text>
  <text x="205" y="170" font-family="sans-serif" font-size="9" fill="#6C63FF">C_in</text>
  <text x="340" y="90" font-family="sans-serif" font-size="9" fill="#6C63FF">L_d</text>
  <text x="340" y="290" font-family="sans-serif" font-size="9" fill="#6C63FF">L_s</text>

  <!-- Title -->
  <text x="320" y="300" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E" text-anchor="middle">LNA Schematic</text>

  <!-- Placeholder watermark -->
  <text x="320" y="340" font-family="sans-serif" font-size="10" fill="#C0C0C0" text-anchor="middle">PLACEHOLDER</text>
</svg>
