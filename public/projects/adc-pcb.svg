<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <!-- Background -->
  <rect width="640" height="360" fill="#F8F9FA"/>

  <!-- PCB board outline -->
  <rect x="120" y="50" width="400" height="240" fill="none" stroke="#1A1A2E" stroke-width="2.5" rx="8"/>

  <!-- Mounting holes -->
  <circle cx="140" cy="70" r="6" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="500" cy="70" r="6" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="140" cy="270" r="6" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="500" cy="270" r="6" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>

  <!-- Traces - horizontal -->
  <g stroke="#6C63FF" stroke-width="2" opacity="0.6">
    <line x1="170" y1="110" x2="300" y2="110"/>
    <line x1="170" y1="150" x2="280" y2="150"/>
    <line x1="340" y1="110" x2="470" y2="110"/>
    <line x1="320" y1="150" x2="470" y2="150"/>
    <line x1="170" y1="200" x2="250" y2="200"/>
    <line x1="290" y1="200" x2="470" y2="200"/>
    <line x1="170" y1="240" x2="470" y2="240"/>
  </g>

  <!-- Traces - vertical -->
  <g stroke="#6C63FF" stroke-width="2" opacity="0.6">
    <line x1="300" y1="110" x2="300" y2="150"/>
    <line x1="280" y1="150" x2="280" y2="200"/>
    <line x1="340" y1="110" x2="340" y2="180"/>
    <line x1="400" y1="150" x2="400" y2="240"/>
  </g>

  <!-- Component pads (ICs) -->
  <rect x="290" y="90" width="50" height="30" fill="#6C63FF" opacity="0.15" stroke="#6C63FF" stroke-width="1.5" rx="2"/>
  <text x="315" y="110" font-family="monospace" font-size="7" fill="#1A1A2E" text-anchor="middle">ADS1256</text>

  <rect x="180" y="130" width="40" height="25" fill="#6C63FF" opacity="0.15" stroke="#6C63FF" stroke-width="1.5" rx="2"/>
  <text x="200" y="147" font-family="monospace" font-size="7" fill="#1A1A2E" text-anchor="middle">INA</text>

  <!-- Passive components (small rectangles) -->
  <rect x="220" y="105" width="16" height="10" fill="#1A1A2E" opacity="0.3" rx="1"/>
  <rect x="360" y="105" width="16" height="10" fill="#1A1A2E" opacity="0.3" rx="1"/>
  <rect x="380" y="145" width="16" height="10" fill="#1A1A2E" opacity="0.3" rx="1"/>
  <rect x="250" y="195" width="16" height="10" fill="#1A1A2E" opacity="0.3" rx="1"/>
  <rect x="200" y="195" width="16" height="10" fill="#1A1A2E" opacity="0.3" rx="1"/>
  <rect x="430" y="195" width="16" height="10" fill="#1A1A2E" opacity="0.3" rx="1"/>

  <!-- Vias -->
  <circle cx="300" cy="130" r="3" fill="#6C63FF" opacity="0.5"/>
  <circle cx="340" cy="180" r="3" fill="#6C63FF" opacity="0.5"/>
  <circle cx="400" cy="180" r="3" fill="#6C63FF" opacity="0.5"/>

  <!-- Connector pads -->
  <g fill="none" stroke="#1A1A2E" stroke-width="1.5">
    <rect x="140" y="95" width="20" height="40" rx="2"/>
    <rect x="480" y="95" width="20" height="40" rx="2"/>
  </g>
  <text x="150" y="88" font-family="sans-serif" font-size="7" fill="#1A1A2E" text-anchor="middle">J1</text>
  <text x="490" y="88" font-family="sans-serif" font-size="7" fill="#1A1A2E" text-anchor="middle">J2</text>

  <!-- Ground pour indication -->
  <rect x="130" y="220" width="380" height="55" fill="#1A1A2E" opacity="0.04" rx="4"/>

  <!-- Title -->
  <text x="320" y="315" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E" text-anchor="middle">ADC PCB Layout</text>

  <!-- Placeholder watermark -->
  <text x="320" y="345" font-family="sans-serif" font-size="10" fill="#C0C0C0" text-anchor="middle">PLACEHOLDER</text>
</svg>
