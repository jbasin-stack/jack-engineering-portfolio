<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <!-- Background -->
  <rect width="640" height="360" fill="#F8F9FA"/>

  <!-- Comb-drive structure: interleaved parallel fingers -->
  <!-- Left fixed electrode fingers -->
  <g stroke="#6C63FF" stroke-width="2" fill="none">
    <line x1="200" y1="100" x2="200" y2="260"/>
    <line x1="200" y1="110" x2="280" y2="110"/>
    <line x1="200" y1="140" x2="280" y2="140"/>
    <line x1="200" y1="170" x2="280" y2="170"/>
    <line x1="200" y1="200" x2="280" y2="200"/>
    <line x1="200" y1="230" x2="280" y2="230"/>
  </g>

  <!-- Right moving electrode fingers (proof mass) -->
  <g stroke="#1A1A2E" stroke-width="2" fill="none">
    <line x1="440" y1="100" x2="440" y2="260"/>
    <line x1="360" y1="125" x2="440" y2="125"/>
    <line x1="360" y1="155" x2="440" y2="155"/>
    <line x1="360" y1="185" x2="440" y2="185"/>
    <line x1="360" y1="215" x2="440" y2="215"/>
    <line x1="360" y1="245" x2="440" y2="245"/>
  </g>

  <!-- Proof mass box (center) -->
  <rect x="290" y="90" width="60" height="180" fill="none" stroke="#6C63FF" stroke-width="2.5" rx="2"/>

  <!-- Spring anchors -->
  <path d="M310,90 Q315,70 320,90" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <path d="M330,90 Q335,70 340,90" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <path d="M310,270 Q315,290 320,270" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <path d="M330,270 Q335,290 340,270" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>

  <!-- Anchor pads -->
  <rect x="300" y="55" width="40" height="15" fill="#6C63FF" opacity="0.3" stroke="#6C63FF" stroke-width="1"/>
  <rect x="300" y="285" width="40" height="15" fill="#6C63FF" opacity="0.3" stroke="#6C63FF" stroke-width="1"/>

  <!-- Motion arrow -->
  <line x1="320" y1="175" x2="320" y2="185" stroke="#6C63FF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#6C63FF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="320" y="320" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E" text-anchor="middle">MEMS Accelerometer</text>

  <!-- Placeholder watermark -->
  <text x="320" y="345" font-family="sans-serif" font-size="10" fill="#C0C0C0" text-anchor="middle">PLACEHOLDER</text>
</svg>
