<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <marker id="arrowBlk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1A1A2E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="#F8F9FA"/>

  <!-- ADC Block -->
  <rect x="60" y="130" width="100" height="60" fill="#6C63FF" opacity="0.12" stroke="#6C63FF" stroke-width="2" rx="6"/>
  <text x="110" y="165" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E" text-anchor="middle">ADC</text>
  <text x="110" y="180" font-family="sans-serif" font-size="9" fill="#6C63FF" text-anchor="middle">12-bit I/Q</text>

  <!-- Arrow ADC to FFT -->
  <line x1="160" y1="160" x2="210" y2="160" stroke="#1A1A2E" stroke-width="2" marker-end="url(#arrowBlk)"/>

  <!-- FFT Block -->
  <rect x="220" y="120" width="120" height="80" fill="#6C63FF" opacity="0.2" stroke="#6C63FF" stroke-width="2.5" rx="6"/>
  <text x="280" y="155" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1A1A2E" text-anchor="middle">FFT</text>
  <text x="280" y="175" font-family="sans-serif" font-size="9" fill="#6C63FF" text-anchor="middle">1024-pt Radix-2</text>
  <text x="280" y="190" font-family="sans-serif" font-size="9" fill="#6C63FF" text-anchor="middle">Pipelined</text>

  <!-- Arrow FFT to Magnitude -->
  <line x1="340" y1="160" x2="380" y2="160" stroke="#1A1A2E" stroke-width="2" marker-end="url(#arrowBlk)"/>

  <!-- Magnitude Block -->
  <rect x="390" y="135" width="90" height="50" fill="#6C63FF" opacity="0.12" stroke="#6C63FF" stroke-width="2" rx="6"/>
  <text x="435" y="158" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1A1A2E" text-anchor="middle">|X|^2</text>
  <text x="435" y="174" font-family="sans-serif" font-size="9" fill="#6C63FF" text-anchor="middle">Magnitude</text>

  <!-- Arrow Magnitude to Output -->
  <line x1="480" y1="160" x2="520" y2="160" stroke="#1A1A2E" stroke-width="2" marker-end="url(#arrowBlk)"/>

  <!-- AXI-Stream Output -->
  <rect x="530" y="135" width="70" height="50" fill="#6C63FF" opacity="0.12" stroke="#6C63FF" stroke-width="2" rx="6"/>
  <text x="565" y="158" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1A1A2E" text-anchor="middle">AXI-S</text>
  <text x="565" y="174" font-family="sans-serif" font-size="9" fill="#6C63FF" text-anchor="middle">Output</text>

  <!-- Memory block below FFT -->
  <rect x="240" y="240" width="80" height="45" fill="#6C63FF" opacity="0.12" stroke="#6C63FF" stroke-width="2" rx="6"/>
  <text x="280" y="260" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1A1A2E" text-anchor="middle">BRAM</text>
  <text x="280" y="275" font-family="sans-serif" font-size="9" fill="#6C63FF" text-anchor="middle">Twiddle ROM</text>

  <!-- Arrow Memory to FFT -->
  <line x1="280" y1="240" x2="280" y2="205" stroke="#1A1A2E" stroke-width="2" marker-end="url(#arrowBlk)"/>

  <!-- Clock label -->
  <text x="280" y="110" font-family="monospace" font-size="10" fill="#6C63FF" text-anchor="middle">CLK: 200 MHz</text>

  <!-- Title -->
  <text x="320" y="320" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E" text-anchor="middle">FPGA Block Diagram</text>

  <!-- Placeholder watermark -->
  <text x="320" y="345" font-family="sans-serif" font-size="10" fill="#C0C0C0" text-anchor="middle">PLACEHOLDER</text>
</svg>
