<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <!-- Background -->
  <rect width="640" height="360" fill="#F8F9FA"/>

  <!-- FPGA logic block grid -->
  <g fill="#6C63FF" opacity="0.15" stroke="#6C63FF" stroke-width="1">
    <!-- Row 1 -->
    <rect x="200" y="70" width="36" height="28" rx="3"/>
    <rect x="250" y="70" width="36" height="28" rx="3"/>
    <rect x="300" y="70" width="36" height="28" rx="3"/>
    <rect x="350" y="70" width="36" height="28" rx="3"/>
    <rect x="400" y="70" width="36" height="28" rx="3"/>
    <!-- Row 2 -->
    <rect x="200" y="112" width="36" height="28" rx="3"/>
    <rect x="250" y="112" width="36" height="28" rx="3"/>
    <rect x="300" y="112" width="36" height="28" rx="3"/>
    <rect x="350" y="112" width="36" height="28" rx="3"/>
    <rect x="400" y="112" width="36" height="28" rx="3"/>
    <!-- Row 3 -->
    <rect x="200" y="154" width="36" height="28" rx="3"/>
    <rect x="250" y="154" width="36" height="28" rx="3"/>
    <rect x="300" y="154" width="36" height="28" rx="3"/>
    <rect x="350" y="154" width="36" height="28" rx="3"/>
    <rect x="400" y="154" width="36" height="28" rx="3"/>
    <!-- Row 4 -->
    <rect x="200" y="196" width="36" height="28" rx="3"/>
    <rect x="250" y="196" width="36" height="28" rx="3"/>
    <rect x="300" y="196" width="36" height="28" rx="3"/>
    <rect x="350" y="196" width="36" height="28" rx="3"/>
    <rect x="400" y="196" width="36" height="28" rx="3"/>
  </g>

  <!-- Interconnect lines between blocks -->
  <g stroke="#6C63FF" stroke-width="1" opacity="0.5">
    <!-- Horizontal connections -->
    <line x1="236" y1="84" x2="250" y2="84"/>
    <line x1="286" y1="84" x2="300" y2="84"/>
    <line x1="336" y1="84" x2="350" y2="84"/>
    <line x1="386" y1="84" x2="400" y2="84"/>
    <line x1="236" y1="126" x2="250" y2="126"/>
    <line x1="286" y1="126" x2="300" y2="126"/>
    <line x1="336" y1="126" x2="350" y2="126"/>
    <line x1="386" y1="126" x2="400" y2="126"/>
    <!-- Vertical connections -->
    <line x1="218" y1="98" x2="218" y2="112"/>
    <line x1="268" y1="98" x2="268" y2="112"/>
    <line x1="318" y1="98" x2="318" y2="112"/>
    <line x1="368" y1="98" x2="368" y2="112"/>
    <line x1="418" y1="98" x2="418" y2="112"/>
    <line x1="218" y1="140" x2="218" y2="154"/>
    <line x1="268" y1="140" x2="268" y2="154"/>
    <line x1="318" y1="140" x2="318" y2="154"/>
    <line x1="368" y1="140" x2="368" y2="154"/>
    <line x1="418" y1="140" x2="418" y2="154"/>
    <line x1="218" y1="182" x2="218" y2="196"/>
    <line x1="268" y1="182" x2="268" y2="196"/>
    <line x1="318" y1="182" x2="318" y2="196"/>
    <line x1="368" y1="182" x2="368" y2="196"/>
    <line x1="418" y1="182" x2="418" y2="196"/>
  </g>

  <!-- Highlighted active path -->
  <g stroke="#6C63FF" stroke-width="2.5" fill="none" opacity="0.7">
    <line x1="236" y1="168" x2="250" y2="168"/>
    <line x1="286" y1="168" x2="300" y2="168"/>
    <line x1="336" y1="168" x2="350" y2="168"/>
    <line x1="386" y1="168" x2="400" y2="168"/>
  </g>

  <!-- Chip outline -->
  <rect x="180" y="55" width="280" height="185" fill="none" stroke="#1A1A2E" stroke-width="2" rx="6"/>

  <!-- I/O pins -->
  <g stroke="#1A1A2E" stroke-width="1.5">
    <line x1="180" y1="84" x2="165" y2="84"/>
    <line x1="180" y1="126" x2="165" y2="126"/>
    <line x1="180" y1="168" x2="165" y2="168"/>
    <line x1="180" y1="210" x2="165" y2="210"/>
    <line x1="460" y1="84" x2="475" y2="84"/>
    <line x1="460" y1="126" x2="475" y2="126"/>
    <line x1="460" y1="168" x2="475" y2="168"/>
    <line x1="460" y1="210" x2="475" y2="210"/>
  </g>

  <!-- Title -->
  <text x="320" y="280" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E" text-anchor="middle">FPGA Processor</text>

  <!-- Placeholder watermark -->
  <text x="320" y="310" font-family="sans-serif" font-size="10" fill="#C0C0C0" text-anchor="middle">PLACEHOLDER</text>
</svg>
