<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <!-- Background -->
  <rect width="640" height="360" fill="#F8F9FA"/>

  <!-- Amplifier triangle symbol -->
  <polygon points="240,120 400,180 240,240" fill="none" stroke="#6C63FF" stroke-width="3"/>

  <!-- Input line -->
  <line x1="160" y1="180" x2="240" y2="180" stroke="#6C63FF" stroke-width="2.5"/>
  <!-- Output line -->
  <line x1="400" y1="180" x2="480" y2="180" stroke="#6C63FF" stroke-width="2.5"/>

  <!-- Input terminal circle -->
  <circle cx="160" cy="180" r="5" fill="#6C63FF"/>
  <!-- Output terminal circle -->
  <circle cx="480" cy="180" r="5" fill="#6C63FF"/>

  <!-- Plus sign inside triangle -->
  <text x="300" y="186" font-family="sans-serif" font-size="24" font-weight="bold" fill="#6C63FF" text-anchor="middle">A</text>

  <!-- Input label -->
  <text x="140" y="210" font-family="sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle">RF In</text>
  <!-- Output label -->
  <text x="500" y="210" font-family="sans-serif" font-size="11" fill="#1A1A2E" text-anchor="middle">RF Out</text>

  <!-- Title -->
  <text x="320" y="300" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A1A2E" text-anchor="middle">LNA Design</text>

  <!-- Placeholder watermark -->
  <text x="320" y="340" font-family="sans-serif" font-size="10" fill="#C0C0C0" text-anchor="middle">PLACEHOLDER</text>
</svg>
